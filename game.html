<!DOCTYPE html>
<html>
<head>
  <title>Escape Room Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2 id="player"></h2>
  <p id="timer"></p>

  <h3 id="question"></h3>

  <input type="text" id="answer" placeholder="Enter answer">

  <br><br>

  <button onclick="checkAnswer()">Submit</button>
  <button onclick="useHint()">💡 Hint</button>

  <p id="hintCount">Hints Left: 3</p>

  <p id="level"></p>
  <p id="score"></p>

</div>

<!-- EFFECTS -->
<div id="happyFace">😄</div>
<div id="sadFace">😢</div>
<canvas id="confetti"></canvas>

<!-- POPUP -->
<div id="popup">
  <h2 id="popupText"></h2>
  <button onclick="nextLevel()">▶ Next</button>
  <button onclick="replayLevel()">🔄 Replay</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<!-- SOUND -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
