<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🏆 Leaderboard</h1>

  <table id="leaderboardTable">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="board">
    </tbody>
  </table>

  <br>

  <button onclick="goHome()">🏠 Home</button>
  <button onclick="clearBoard()">🗑 Clear</button>
</div>

<script>

let scores = JSON.parse(localStorage.getItem("leaderboard")) || [];

scores.sort((a, b) => b.score - a.score);

let board = document.getElementById("board");

if(scores.length === 0){
  board.innerHTML = `<tr><td colspan="3">No scores yet</td></tr>`;
} else {

  scores.forEach((player, index) => {

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${index + 1}</td>
      <td>👤 ${player.name}</td>
      <td>⭐ ${player.score}</td>
    `;

    if(index === 0) row.style.color = "gold";
    if(index === 1) row.style.color = "silver";
    if(index === 2) row.style.color = "#cd7f32";

    board.appendChild(row);
  });
}

function goHome(){
  window.location.href = "index.html";
}

function clearBoard(){
  if(confirm("Are you sure you want to clear leaderboard?")){
    localStorage.removeItem("leaderboard");
    location.reload();
  }
}

</script>

</body>
</html>
